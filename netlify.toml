[build]
command = "npm run build"
publish = ".next"

[build.environment]
NODE_VERSION = "20"
NEXT_BUILD = "true"

[[plugins]]
package = "@netlify/plugin-nextjs"

# Cache policy for static assets
[[headers]]
for = "/_next/static/*"
[headers.values]
cache-control = "public, max-age=31536000, immutable"

[[headers]]
for = "/images/*"
[headers.values]
cache-control = "public, max-age=86400"

# Security headers
[[headers]]
for = "/*"
[headers.values]
X-Content-Type-Options = "nosniff"
X-Frame-Options = "DENY"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"
Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' https: wss://*"

# Redirect HTTP to HTTPS
[[redirects]]
from = "http://*"
to = "https://:splat"
status = 301
force = true

# SPA redirects
[[redirects]]
from = "/*"
to = "/index.html"
status = 200
