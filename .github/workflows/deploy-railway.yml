name: Deploy Backend to Railway

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-railway.yml'

  workflow_dispatch:  # Allow manual deployment

jobs:
  validate:
    name: Validate Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Check syntax
        working-directory: ./backend
        run: |
          python -m py_compile api/main.py
          python -m py_compile api/websocket_chart.py
          python -m py_compile api/auth.py

      - name: Verify Docker build
        working-directory: ./backend
        run: docker build -f Dockerfile.prod -t sanddock-backend:test .

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy using Railway CLI
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          npm install -g @railway/cli
          railway up --force

      - name: Verify deployment
        run: |
          sleep 10  # Wait for deployment to start
          BACKEND_URL="${{ secrets.WS_URL }}"
          curl -f "${BACKEND_URL%/ws*}" || exit 1
        timeout-minutes: 5

      - name: Notify deployment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Backend deployed to Railway\n\nBackend URL: ${{ secrets.WS_URL }}'
            })

      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Backend deployment failed. Check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            })
