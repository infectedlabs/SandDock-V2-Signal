version: "3.8"
services:
  signal_engine:
    build: .
    command: python signal_engine.py
    env_file: ../.env.local
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BINANCE_SYMBOL: BTCUSDT
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
    restart: always

  backtest_worker:
    build: .
    command: python backtest_worker.py
    env_file: ../.env.local
    environment:
      DATABASE_URL: ${DATABASE_URL}
    restart: "no"  # runs once then exits
