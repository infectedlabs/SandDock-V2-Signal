version: "3.8"
services:
  api:
    # Single service runs both FastAPI WebSocket API and stream_subscriber
    # (stream_subscriber starts automatically as a background asyncio task)
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    env_file: ../.env.local
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
    ports:
      - "8000:8000"
    restart: unless-stopped
